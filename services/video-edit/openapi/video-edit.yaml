openapi: 3.1.0
info:
  title: Video Editing API
  version: 1.0.0
  description: |
    Video creation, editing, composition, and analysis API. Provides asset
    preparation, video composition with insert/overlay/PIP modes, async
    rendering, multimodal video analysis, and job management.

    ## Design Principle

    Use AI for creative generation and editorial decisions. Use deterministic
    rendering for exact details. Spreadsheets, PDFs, screenshots, and branded
    assets are composited with ffmpeg — never regenerated by an LLM or video
    model.

    ## Typical Workflow

    1. **Prepare assets** — Convert PDFs to PNG pages, normalize images to a
       target canvas, or ingest video/audio clips.
    2. **Compose or render** — Insert prepared assets into a source video at
       specified timestamps with positioning, transitions, and animation.
    3. **Poll** — All heavy operations are async. Poll the job endpoint until
       `status` is `completed`.
    4. **Review** — Send extracted frames to a multimodal LLM with a question.
       Verify the edit without watching the video.
    5. **Download** — Get the rendered MP4 via presigned S3 URL.

    ## Authentication

    Same as all platform services:

    ```
    Authorization: Bearer <user JWT>
    X-Admin-Key: <MCP_ADMIN_KEY>           # optional, service-to-service
    ```

    The JWT's `api_settings` carries provider API keys used by the analyze
    and review endpoints. No new credentials needed.

    ## Storage

    All outputs (prepared assets, renders, previews) are stored in Hetzner S3
    with a 72-hour TTL. Assets and renders are automatically cleaned up after
    expiry. Permanent retention requires explicit promotion to the Lakehouse.

    ## Limits

    - Max 10 concurrent queued/running jobs per user
    - Max 500MB source file download
    - Render timeout: 30 minutes
    - Preview: max 30 frames per request
    - Review/Analyze: max 20 frames sent to LLM

  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: https://api.apifunnel.ai/v1
    description: Production
  - url: http://localhost:3005/v1
    description: Local development

security:
  - BearerAuth: []
  - BearerAuth: []
    AdminKeyAuth: []

tags:
  - name: Assets
    description: |
      Prepare source assets for use in video timelines. Accepts images, PDFs,
      video, and audio via URL. Converts to render-ready formats: PDFs become
      PNG page sequences, images are normalized to a target canvas size with
      configurable fit/background, video and audio are probed and stored.

      Every prepare call creates a `VideoAsset` record and a background job.
      Poll the job to track progress. Once complete, the asset's
      `prepared_outputs` contain S3 URIs and presigned download URLs.
  - name: Renders
    description: |
      Compose and render video from source material and prepared assets.

      The primary endpoint is **compose** — takes a source video URL and an
      array of insert specifications. Each insert places an asset at a
      timestamp with a mode (fullscreen, PIP, overlay), optional transitions
      (fade, slide), and optional animation (Ken Burns zoom/pan).

      Compose returns a job ID. Once complete, the render has an output URL,
      duration, dimensions, and file size. Use the download endpoint for a
      presigned redirect. Use the preview endpoint to extract a thumbnail
      strip. Use the review endpoint to send frames to an LLM for
      verification.
  - name: Analysis
    description: |
      Multimodal video analysis. Accepts any video URL (direct MP4 or
      YouTube/Vimeo via yt-dlp), extracts frames and transcript, sends them
      to an LLM with the caller's question. Returns the LLM's answer.

      The caller's LLM provider key comes from JWT `api_settings` — same
      pattern as the one-shot agent node. No new credentials.

      Use for any question about video content: "count the jumping jacks",
      "what time slots have the highest intensity", "does the logo appear
      in the bottom-right corner", "summarize this meeting recording".
  - name: Transcript
    description: |
      Extract timestamped transcripts from video URLs. Pure infrastructure —
      no LLM involved. Tries embedded captions first (YouTube/Vimeo auto-subs),
      falls back to Whisper speech-to-text if server-side API keys are
      configured (GROQ_API_KEY or WHISPER_OPENAI_API_KEY).
  - name: Jobs
    description: |
      Poll and manage async operations. Every prepare, compose, and render
      operation returns a `job_id`. Use the jobs endpoints to track progress,
      retrieve results, or cancel queued/running work.

      Job statuses: `queued` → `running` → `completed` | `failed` | `cancelled`.

      Completed jobs include a `result` object with output URLs, dimensions,
      duration, and file size. Failed jobs include an `error` string.

paths:
  # ── Assets ──

  /video/assets/prepare:
    post:
      operationId: prepareVideoAsset
      summary: Prepare a source asset for video use
      description: |
        Downloads a source asset (image, PDF, video, audio) from a URL,
        converts it to a render-ready format, and uploads the result to S3.

        **What it does per asset type:**

        - **PDF** — Converts selected pages (or all pages) to PNG images
          using poppler. Optionally normalizes each page to a target canvas
          size with configurable fit mode and background color.
        - **Image** (PNG, JPG, WebP, etc.) — Normalizes to a target canvas
          size using ffmpeg. Supports contain (letterbox), cover (crop to
          fill), and fill (stretch) fit modes.
        - **Video** — Probes for metadata (duration, resolution, codec) and
          stores the source file in S3 for use in compositions.
        - **Audio** — Probes for metadata and stores in S3.

        Returns immediately with an `asset_id` and `job_id`. The preparation
        runs asynchronously. Poll `GET /video/jobs/{job_id}` for progress.

        Once complete, use `GET /video/assets/{asset_id}` to retrieve metadata
        and presigned download URLs for the prepared outputs.
      tags: [Assets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepareAssetRequest'
            examples:
              pdf_to_png:
                summary: Convert specific PDF pages to 1080p PNGs
                value:
                  source:
                    kind: url
                    uri: "https://example.com/quarterly-report.pdf"
                  target:
                    format: png
                    width: 1920
                    height: 1080
                    pages: [1, 3, 5]
                    fit: contain
                    background: "#ffffff"
              image_normalize:
                summary: Normalize an image to 1080p with letterboxing
                value:
                  source:
                    kind: url
                    uri: "https://example.com/product-screenshot.png"
                  target:
                    format: png
                    width: 1920
                    height: 1080
                    fit: contain
                    background: "#000000"
              video_ingest:
                summary: Ingest a video clip for use in compositions
                value:
                  source:
                    kind: url
                    uri: "https://example.com/b-roll-clip.mp4"
      responses:
        '200':
          description: Asset creation initiated. Poll the job for progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrepareAssetResponse'
              example:
                asset_id: "vid_asset_1711234567_abc123"
                job_id: "prepare_job_1711234567_def456"
                status: "queued"
        '400':
          description: Missing `source.uri`.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many active jobs. Wait for some to complete.

  /video/assets/{id}:
    get:
      operationId: getVideoAsset
      summary: Get asset metadata and download URLs
      description: |
        Returns the full metadata for a prepared video asset, including type,
        dimensions, page count, and all prepared outputs with presigned
        download URLs.

        The `prepared_outputs` array contains one entry per prepared file.
        Each entry has a `download_url` field with a presigned S3 URL valid
        for 1 hour. For PDF assets, each page is a separate output.
      tags: [Assets]
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoAssetResponse'
              example:
                asset_id: "vid_asset_1711234567_abc123"
                type: "pdf"
                source:
                  kind: "url"
                  uri: "https://example.com/report.pdf"
                width: 1920
                height: 1080
                page_count: 12
                prepared_outputs:
                  - id: "vid_asset_1711234567_abc123_pages"
                    asset_id: "vid_asset_1711234567_abc123"
                    type: "image_sequence"
                    uri: "s3://bucket/video-edit/user/assets/vid_asset_.../page_1.png"
                    width: 1920
                    height: 1080
                    pages: [1, 3, 5]
                    download_url: "https://s3.example.com/...?X-Amz-Signature=..."
                created_at: "2026-05-05T13:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteVideoAsset
      summary: Delete a prepared asset and its S3 outputs
      description: |
        Deletes the asset record from the database and removes all prepared
        output files from S3. This is permanent.
      tags: [Assets]
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                  asset_id: { type: string }
              example:
                deleted: true
                asset_id: "vid_asset_1711234567_abc123"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Renders ──

  /video/renders/compose:
    post:
      operationId: composeVideo
      summary: Insert assets into a source video
      description: |
        The primary editing endpoint. Takes a source video and an array of
        insert specifications. Each insert places a prepared asset at a
        specific timestamp with configurable mode, transitions, and animation.

        **Insert modes:**

        | Mode | Behavior |
        |---|---|
        | `fullscreen` | Replaces the video frame entirely. Source audio continues. |
        | `overlay` | Asset appears semi-transparently over the source video. |
        | `pip` | Asset appears as a small picture-in-picture in a corner. |
        | `cutaway` | Same as fullscreen, semantically a document/b-roll callout. |
        | `side_by_side` | Source and asset share the frame. |
        | `background` | Asset becomes the background layer. |

        **Transitions:** `fade`, `crossfade`, `slide_in`, `cut` (default).
        Set `transition_duration` in seconds.

        **Animation:** Ken Burns zoom/pan. Specify `from` and `to` scale +
        position. The renderer interpolates linearly over the insert duration.

        **Asset references:** Use `asset://lakehouse/{asset_id}` for prepared
        assets, or direct HTTP URLs. The compose worker resolves asset
        references, downloads all inputs, builds an ffmpeg filter graph,
        renders the output, and uploads to S3.

        Returns a `job_id`. Poll `GET /video/jobs/{job_id}` for progress.
      tags: [Renders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComposeRequest'
            examples:
              spreadsheet_insert:
                summary: Insert a spreadsheet PNG with Ken Burns zoom
                value:
                  source_video: "https://example.com/presentation.mp4"
                  inserts:
                    - at: "00:01:12"
                      duration: 8
                      asset: "asset://lakehouse/vid_asset_spreadsheet_123"
                      mode: fullscreen
                      transition: fade
                      transition_duration: 0.5
                      animation:
                        type: ken_burns
                        from: { scale: 1, x: "50%", y: "50%" }
                        to: { scale: 1.8, x: "40%", y: "35%" }
                      audio: continue_source
                  output:
                    format: mp4
                    width: 1920
                    height: 1080
              logo_pip:
                summary: Add a logo PIP in the bottom-right corner
                value:
                  source_video: "https://example.com/tutorial.mp4"
                  inserts:
                    - at: 0
                      duration: 30
                      asset: "asset://lakehouse/vid_asset_logo_456"
                      mode: pip
                      position: bottom-right
                      size: "15%"
                  output:
                    width: 1920
                    height: 1080
              multi_insert:
                summary: Multiple inserts with different modes
                value:
                  source_video: "https://example.com/meeting.mp4"
                  inserts:
                    - at: 30
                      duration: 6
                      asset: "asset://lakehouse/vid_asset_chart_png"
                      mode: fullscreen
                      transition: fade
                      transition_duration: 0.3
                      audio: continue_source
                    - at: 60
                      duration: 10
                      asset: "asset://lakehouse/vid_asset_logo"
                      mode: pip
                      position: top-right
                      size: "20%"
                    - at: 90
                      duration: 5
                      asset: "asset://lakehouse/vid_asset_watermark"
                      mode: overlay
                  output:
                    format: mp4
                    width: 1280
                    height: 720
                    quality: high
      responses:
        '200':
          description: Compose job queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreatedResponse'
              example:
                job_id: "compose_job_1711234567_abc123"
                status: "queued"
        '400':
          description: Missing `source_video` or empty `inserts` array.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many active jobs.

  /video/renders/{id}:
    get:
      operationId: getRender
      summary: Get render metadata and output URL
      description: |
        Returns metadata for a completed (or in-progress) render job,
        including the presigned output URL, duration, dimensions, and file
        size. The `output_url` is a presigned S3 URL valid for 1 hour.
      tags: [Renders]
      parameters:
        - $ref: '#/components/parameters/RenderId'
      responses:
        '200':
          description: Render metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderResponse'
              example:
                job_id: "compose_job_1711234567_abc123"
                status: "completed"
                progress: 100
                output_url: "https://s3.example.com/...output.mp4?X-Amz-Signature=..."
                duration_seconds: 120
                width: 1920
                height: 1080
                file_size_bytes: 15728640
                created_at: "2026-05-05T13:00:00.000Z"
                completed_at: "2026-05-05T13:02:30.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /video/renders/{id}/download:
    get:
      operationId: downloadRender
      summary: Download rendered video
      description: |
        Returns a 302 redirect to a presigned S3 URL for the rendered MP4.
        The presigned URL is valid for 1 hour. Only available for completed
        renders.
      tags: [Renders]
      parameters:
        - $ref: '#/components/parameters/RenderId'
      responses:
        '302':
          description: Redirect to presigned S3 download URL.
          headers:
            Location:
              schema: { type: string }
              description: Presigned S3 URL for the rendered video.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Render not found or not yet completed.

  /video/renders/{id}/preview:
    post:
      operationId: previewRender
      summary: Extract thumbnail strip from a completed render
      description: |
        Extracts evenly-spaced frames from a completed render and uploads
        them to S3 as JPEG thumbnails. Returns an array of timestamped
        frame URLs.

        Use this to give an assistant or UI a visual summary of the render
        without downloading the full video. Each frame has a presigned URL
        valid for 1 hour.
      tags: [Renders]
      parameters:
        - $ref: '#/components/parameters/RenderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewRequest'
            example:
              frame_count: 12
              width: 320
      responses:
        '200':
          description: Thumbnail strip extracted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
              example:
                render_id: "compose_job_1711234567_abc123"
                frames:
                  - timestamp: "00:00:00"
                    image_url: "https://s3.example.com/...frame_0001.jpg?..."
                  - timestamp: "00:00:10"
                    image_url: "https://s3.example.com/...frame_0002.jpg?..."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Render not found or not yet completed.

  /video/renders/{id}/review:
    post:
      operationId: reviewRender
      summary: Multimodal LLM analysis of a completed render
      description: |
        Extracts frames from a completed render, sends them to a multimodal
        LLM with the caller's question, and returns the answer. One call.

        The caller provides a `question` (required) and optionally a `model`.
        The endpoint handles frame extraction, base64 encoding, and LLM
        dispatch internally. No separate preview or one-shot call needed.

        The caller's LLM provider key comes from JWT `api_settings`.

        Use for any question about the rendered output: verifying edit
        placement, checking visual quality, counting objects, describing
        content, or any other multimodal analysis task.
      tags: [Renders]
      parameters:
        - $ref: '#/components/parameters/RenderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
            examples:
              verify_edit:
                summary: Verify an edit placement
                value:
                  question: "Does the spreadsheet appear at the 1:12 mark? Is the logo visible in the bottom-right corner?"
                  model: "gpt-4o-mini"
              general_analysis:
                summary: General content analysis
                value:
                  question: "Describe the visual content at each timestamp. How many distinct scenes are there?"
                  model: "gpt-4o-mini"
                  frame_count: 15
      responses:
        '200':
          description: LLM analysis of the render.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
              example:
                render_id: "compose_job_1711234567_abc123"
                review: "The spreadsheet insert is visible from 1:12 to 1:20 with a Ken Burns zoom effect..."
                frames_analyzed: 10
                model: "gpt-4o-mini-2024-07-18"
                provider: "openai"
                tokens: { input: 142000, output: 350, total: 142350 }
        '400':
          description: Missing `question` or no LLM provider key in JWT.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Render not found or not yet completed.
        '500':
          description: Review failed (frame extraction error, LLM error).
        '502':
          description: Upstream LLM provider returned an error.

  # ── Analysis ──

  /video/analyze:
    post:
      operationId: analyzeVideo
      summary: Multimodal LLM analysis of any video URL
      description: |
        Accepts any video URL — direct MP4, YouTube, Vimeo — downloads it,
        extracts frames and transcript (when available), sends everything to
        a multimodal LLM with the caller's question, and returns the answer.

        **URL handling:**

        - **YouTube / Vimeo** — Downloaded via yt-dlp with proxy support.
          Captions are extracted when available; Whisper fallback for
          transcription. Full preprocessing pipeline.
        - **Direct MP4 / video URL** — Downloaded via HTTP fetch. Frames
          extracted with ffmpeg. No transcript extraction (no speech track
          analysis for direct URLs in Phase 1).

        The caller's LLM provider key comes from JWT `api_settings`.

        Both `url` and `question` are required. No default prompts — the
        caller's question drives the entire analysis.
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
            examples:
              content_analysis:
                summary: Analyze video content
                value:
                  url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                  question: "What is happening in this video? Describe the key moments with timestamps."
                  model: "gpt-4o-mini"
              exercise_counting:
                summary: Count exercises in a fitness video
                value:
                  url: "https://example.com/workout.mp4"
                  question: "Count the number of jumping jacks. What time slots have the highest intensity movements?"
                  model: "gpt-4o-mini"
                  frame_count: 20
              meeting_recap:
                summary: Recap a meeting recording
                value:
                  url: "https://example.com/standup-recording.mp4"
                  question: "Who spoke? What decisions were made? List action items with owners."
                  model: "gpt-4o-mini"
                  max_tokens: 4096
      responses:
        '200':
          description: LLM analysis of the video.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
              example:
                url: "https://example.com/workout.mp4"
                answer: "I counted approximately 24 jumping jacks across the video..."
                frames_analyzed: 20
                transcript_length: 0
                model: "gpt-4o-mini-2024-07-18"
                provider: "openai"
                tokens: { input: 142000, output: 500, total: 142500 }
        '400':
          description: Missing `url`, missing `question`, or no LLM provider key.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Video unavailable (private, deleted, geo-restricted).
        '500':
          description: Analysis failed (download error, ffmpeg error, LLM error).
        '502':
          description: Upstream failure (yt-dlp download, Whisper transcription, or LLM provider error).
        '504':
          description: Video download or processing timed out.

  # ── Transcript ──

  /video/transcript:
    get:
      operationId: getVideoTranscript
      summary: Extract timestamped transcript from a video URL
      description: |
        Pure infrastructure — no LLM involved, no reasoning, no inference.
        Extracts a timestamped transcript from a video URL.

        **Strategy:**

        1. Tries embedded captions first (YouTube/Vimeo auto-generated or
           manually uploaded subtitles via yt-dlp).
        2. Falls back to Whisper speech-to-text if server-side API keys are
           configured (`GROQ_API_KEY` or `WHISPER_OPENAI_API_KEY`).

        Returns the transcript with per-segment timestamps in
        `HH:MM:SS text` format.
      tags: [Transcript]
      parameters:
        - name: url
          in: query
          required: true
          description: Video URL (YouTube, Vimeo, or any yt-dlp-supported platform).
          schema:
            type: string
          example: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      responses:
        '200':
          description: Transcript extracted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptResponse'
              example:
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                source: "captions"
                duration_seconds: 212
                transcript: "00:00:00 We're no strangers to love\n00:00:03 You know the rules..."
        '400':
          description: Missing `url` query parameter.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: |
            Video unavailable (private, deleted, geo-restricted) or no
            captions found and no Whisper API key configured for fallback.
        '502':
          description: Whisper transcription failed or yt-dlp error.
        '504':
          description: Video download or processing timed out.

  # ── Jobs ──

  /video/jobs/{id}:
    get:
      operationId: getVideoJob
      summary: Poll async job status
      description: |
        Returns the current status and progress of any video editing job
        (prepare, compose, render). Poll this endpoint until `status` is
        `completed` or `failed`.

        **Progress:** The `progress` field is a 0-100 integer representing
        approximate completion percentage. Stages vary by job type:
        - Prepare: 10 (downloading) → 30 (downloaded) → 60 (converting) → 100
        - Compose: 5 (queued) → 20 (source downloaded) → 40 (assets resolved) → 80 (rendering) → 100

        **Result:** When `status` is `completed`, the `result` object
        contains output URLs, dimensions, duration, and file size. For
        prepare jobs, `result.outputs` lists all prepared files. For
        compose/render jobs, `result.output_url` is the presigned download.

        **Error:** When `status` is `failed`, the `error` string describes
        what went wrong.
      tags: [Jobs]
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusResponse'
              examples:
                running:
                  summary: Job in progress
                  value:
                    id: "compose_job_1711234567_abc123"
                    type: "compose"
                    status: "running"
                    progress: 40
                    result: null
                    error: null
                    created_at: "2026-05-05T13:00:00.000Z"
                    updated_at: "2026-05-05T13:00:15.000Z"
                completed:
                  summary: Completed compose job
                  value:
                    id: "compose_job_1711234567_abc123"
                    type: "compose"
                    status: "completed"
                    progress: 100
                    result:
                      output_url: "https://s3.example.com/...?X-Amz-Signature=..."
                      s3_key: "video-edit/user/renders/compose_job_.../output.mp4"
                      duration_seconds: 120
                      width: 1920
                      height: 1080
                      file_size_bytes: 15728640
                    error: null
                    created_at: "2026-05-05T13:00:00.000Z"
                    updated_at: "2026-05-05T13:02:30.000Z"
                    completed_at: "2026-05-05T13:02:30.000Z"
                failed:
                  summary: Failed job
                  value:
                    id: "prepare_job_1711234567_xyz789"
                    type: "prepare"
                    status: "failed"
                    progress: 10
                    result: null
                    error: "Access to internal/private addresses is blocked"
                    created_at: "2026-05-05T13:00:00.000Z"
                    updated_at: "2026-05-05T13:00:01.000Z"
                    completed_at: "2026-05-05T13:00:01.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /video/jobs/{id}/cancel:
    post:
      operationId: cancelVideoJob
      summary: Cancel a queued or running job
      description: |
        Marks a job as cancelled. Only works for jobs in `queued` or `running`
        status. Jobs that have already completed, failed, or been cancelled
        cannot be cancelled again.

        Note: cancellation is best-effort. If the job's ffmpeg process is
        already running, it may complete before the cancellation takes effect.
        The job record will still be marked as cancelled.
      tags: [Jobs]
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string, enum: [cancelled] }
              example:
                id: "compose_job_1711234567_abc123"
                status: "cancelled"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Job not found or not in a cancellable state.

components:
  securitySchemes:
    AdminKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Service-to-service authentication key.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token from the platform authentication system. Contains `sub`
        (user ID), `api_settings` (provider API keys), and standard claims.

  parameters:
    AssetId:
      name: id
      in: path
      required: true
      description: |
        The video asset ID (e.g., `vid_asset_1711234567_abc123`). Returned
        by `POST /video/assets/prepare`.
      schema:
        type: string
      example: "vid_asset_1711234567_abc123"
    RenderId:
      name: id
      in: path
      required: true
      description: |
        The render job ID (e.g., `compose_job_1711234567_abc123`). Returned
        by `POST /video/renders/compose`.
      schema:
        type: string
      example: "compose_job_1711234567_abc123"
    JobId:
      name: id
      in: path
      required: true
      description: |
        Any video editing job ID — prepare, compose, or render.
      schema:
        type: string
      example: "compose_job_1711234567_abc123"

  schemas:
    # ── Request Schemas ──

    PrepareAssetRequest:
      type: object
      required: [source]
      properties:
        source:
          type: object
          required: [uri]
          properties:
            kind:
              type: string
              enum: [url, lakehouse_asset, upload, data_url]
              default: url
              description: How the source is referenced. Only `url` is supported in Phase 1.
            uri:
              type: string
              description: The source URL. Must be HTTP or HTTPS. Private/internal IPs are blocked.
            mime_type:
              type: string
              description: Optional MIME type hint. If omitted, inferred from the URL extension.
        target:
          type: object
          description: Desired output format and dimensions. Omit for sensible defaults.
          properties:
            format:
              type: string
              enum: [png, jpg, webp]
              default: png
            width:
              type: integer
              description: Target width in pixels.
            height:
              type: integer
              description: Target height in pixels.
            pages:
              type: array
              items: { type: integer }
              description: For PDFs — which pages to convert (1-indexed). Omit for all pages.
            fit:
              type: string
              enum: [contain, cover, fill]
              default: contain
              description: |
                How to fit the source into the target dimensions:
                - `contain` — Letterbox. Full source visible, padded with background color.
                - `cover` — Crop to fill. Source fills the frame, edges may be clipped.
                - `fill` — Stretch to fill. Aspect ratio is not preserved.
            background:
              type: string
              description: Background color for letterboxing (contain mode). CSS color string.
              default: "black"
              example: "#ffffff"

    ComposeRequest:
      type: object
      required: [source_video, inserts]
      properties:
        source_video:
          type: string
          description: |
            The source video URL or asset reference. Supports direct HTTP URLs
            and `asset://lakehouse/{asset_id}` references.
        inserts:
          type: array
          minItems: 1
          description: Array of insert specifications. At least one required.
          items:
            $ref: '#/components/schemas/ComposeInsert'
        output:
          $ref: '#/components/schemas/OutputSpec'

    ComposeInsert:
      type: object
      required: [at, duration, asset, mode]
      properties:
        at:
          oneOf:
            - type: number
            - type: string
          description: |
            When to insert the asset. Accepts seconds (number) or timestamp
            string (`"00:01:12"`, `"1:12"`, `"72"`).
        duration:
          type: number
          description: How long the insert is visible, in seconds.
        asset:
          type: string
          description: |
            The asset to insert. Use `asset://lakehouse/{asset_id}` for
            prepared assets, or a direct HTTP URL.
        mode:
          type: string
          enum: [fullscreen, overlay, pip, side_by_side, background, cutaway]
          description: |
            How the asset is composited:
            - `fullscreen` — Replaces the video frame. Source audio continues.
            - `overlay` — Semi-transparent layer over the source video.
            - `pip` — Small picture-in-picture in a corner.
            - `cutaway` — Same as fullscreen, semantically a document callout.
            - `side_by_side` — Source and asset share the frame.
            - `background` — Asset becomes the background layer.
        position:
          type: string
          enum: [top-left, top-right, bottom-left, bottom-right, center]
          description: For `pip` mode — where to place the PIP. Default `bottom-right`.
        size:
          type: string
          description: |
            For `pip` mode — size as a percentage of canvas width (e.g., `"22%"`)
            or absolute pixels (e.g., `"300"`). Default `"25%"`.
        transition:
          type: string
          enum: [cut, fade, crossfade, slide_in, fade_to_black, fade_from_black, wipe, push, zoom]
          description: Transition type when the insert appears/disappears. Default `cut`.
        transition_duration:
          type: number
          description: Transition duration in seconds. Default 0 (hard cut).
        animation:
          type: object
          description: Ken Burns zoom/pan animation over the insert duration.
          properties:
            type:
              type: string
              enum: [ken_burns]
            from:
              type: object
              properties:
                scale: { type: number }
                x: { type: string, description: "Percentage, e.g. '50%'" }
                y: { type: string }
            to:
              type: object
              properties:
                scale: { type: number }
                x: { type: string }
                y: { type: string }
        audio:
          type: string
          enum: [continue_source, mute_source, mix]
          description: |
            Audio behavior during the insert:
            - `continue_source` — Source video audio plays through.
            - `mute_source` — Source audio is muted during the insert.
            - `mix` — Mix source audio with insert's audio (if any).

    OutputSpec:
      type: object
      description: Output format configuration. All fields optional with sensible defaults.
      properties:
        format:
          type: string
          enum: [mp4, webm, gif]
          default: mp4
        width:
          type: integer
          default: 1920
        height:
          type: integer
          default: 1080
        fps:
          type: integer
          default: 30
        quality:
          type: string
          enum: [low, medium, high]
          default: medium
          description: |
            Encoding quality preset:
            - `low` — CRF 28, smaller file
            - `medium` — CRF 23, balanced
            - `high` — CRF 18, best quality

    PreviewRequest:
      type: object
      properties:
        frame_count:
          type: integer
          default: 12
          maximum: 30
          description: Number of evenly-spaced frames to extract.
        width:
          type: integer
          default: 320
          description: Thumbnail width in pixels. Height is auto-calculated.

    ReviewRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          description: |
            The question or prompt to answer about the rendered video. Required.
            No default prompt — the caller's question drives the analysis.
            Alias: `prompt` is also accepted.
        prompt:
          type: string
          description: Alias for `question`. If both are provided, `question` takes precedence.
        model:
          type: string
          default: gpt-4o-mini
          description: LLM model ID. Provider inferred from prefix.
        frame_count:
          type: integer
          default: 10
          maximum: 20
          description: Number of frames to extract and send to the LLM.
        max_tokens:
          type: integer
          default: 2048
          description: Maximum output tokens for the LLM response.

    AnalyzeRequest:
      type: object
      required: [url, question]
      properties:
        url:
          type: string
          description: |
            Video URL. Supports direct MP4/WebM URLs and YouTube/Vimeo URLs.
            YouTube URLs are downloaded via yt-dlp with transcript extraction.
            Direct URLs are downloaded via HTTP fetch with frame extraction only.
        question:
          type: string
          description: |
            The question or prompt to answer about the video. Required.
            No default prompt — the caller's question drives the analysis.
            Alias: `prompt` is also accepted.
        prompt:
          type: string
          description: Alias for `question`. If both are provided, `question` takes precedence.
        model:
          type: string
          default: gpt-4o-mini
          description: LLM model ID. Provider inferred from prefix.
        frame_count:
          type: integer
          default: 12
          maximum: 30
          description: Number of frames to extract and send to the LLM.
        max_tokens:
          type: integer
          default: 4096
          description: Maximum output tokens for the LLM response.

    # ── Response Schemas ──

    PrepareAssetResponse:
      type: object
      required: [asset_id, job_id, status]
      properties:
        asset_id:
          type: string
          description: The created asset ID. Use this to reference the asset in compositions.
        job_id:
          type: string
          description: The preparation job ID. Poll `GET /video/jobs/{job_id}` for progress.
        status:
          type: string
          enum: [queued]

    VideoAssetResponse:
      type: object
      required: [asset_id, type, source, prepared_outputs, created_at]
      properties:
        asset_id: { type: string }
        type:
          type: string
          enum: [video, image, audio, pdf, document, spreadsheet, subtitle, unknown]
        source:
          type: object
          properties:
            kind: { type: string }
            uri: { type: string }
        mime_type: { type: string, nullable: true }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        page_count: { type: integer, nullable: true }
        duration_seconds: { type: number, nullable: true }
        prepared_outputs:
          type: array
          items:
            $ref: '#/components/schemas/PreparedOutput'
        created_at: { type: string, format: date-time }

    PreparedOutput:
      type: object
      required: [id, asset_id, type, uri]
      properties:
        id: { type: string }
        asset_id: { type: string }
        type:
          type: string
          enum: [image_sequence, video_clip, audio_clip, subtitle_file]
        uri: { type: string, description: S3 URI of the prepared output. }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        duration_seconds: { type: number, nullable: true }
        pages:
          type: array
          nullable: true
          items: { type: integer }
        download_url:
          type: string
          nullable: true
          description: Presigned S3 download URL. Valid for 1 hour.

    JobCreatedResponse:
      type: object
      required: [job_id, status]
      properties:
        job_id: { type: string }
        status: { type: string, enum: [queued] }

    RenderResponse:
      type: object
      required: [job_id, status, progress]
      properties:
        job_id: { type: string }
        status: { type: string, enum: [queued, running, completed, failed, cancelled] }
        progress: { type: integer, minimum: 0, maximum: 100 }
        output_url: { type: string, nullable: true, description: Presigned S3 URL. Only present when completed. }
        duration_seconds: { type: number, nullable: true }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        file_size_bytes: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    PreviewResponse:
      type: object
      required: [render_id, frames]
      properties:
        render_id: { type: string }
        frames:
          type: array
          items:
            type: object
            required: [timestamp, image_url]
            properties:
              timestamp: { type: string, description: "HH:MM:SS format" }
              image_url: { type: string, description: Presigned S3 URL for the thumbnail. }

    ReviewResponse:
      type: object
      required: [render_id, review, frames_analyzed, model, provider, tokens]
      properties:
        render_id: { type: string }
        review: { type: string, description: The LLM's analysis text. }
        frames_analyzed: { type: integer }
        model: { type: string }
        provider: { type: string, enum: [openai, anthropic, google] }
        tokens:
          type: object
          properties:
            input: { type: integer }
            output: { type: integer }
            total: { type: integer }

    AnalyzeResponse:
      type: object
      required: [url, answer, frames_analyzed, transcript_length, model, provider, tokens]
      properties:
        url: { type: string }
        answer: { type: string, description: The LLM's analysis text. }
        frames_analyzed: { type: integer }
        transcript_length: { type: integer, description: Length of extracted transcript in characters. 0 if no transcript. }
        model: { type: string }
        provider: { type: string, enum: [openai, anthropic, google] }
        tokens:
          type: object
          properties:
            input: { type: integer }
            output: { type: integer }
            total: { type: integer }

    TranscriptResponse:
      type: object
      required: [url, source, duration_seconds, transcript]
      properties:
        url: { type: string, description: The video URL that was transcribed. }
        source:
          type: string
          enum: [captions, whisper]
          description: |
            How the transcript was obtained:
            - `captions` — Extracted from embedded subtitles (YouTube auto-subs, manual uploads).
            - `whisper` — Transcribed via Whisper speech-to-text API.
        duration_seconds: { type: number, description: Video duration in seconds. }
        transcript:
          type: string
          description: |
            Timestamped transcript in `HH:MM:SS text` format, one segment per line.
            Example: `00:00:00 We're no strangers to love\n00:00:03 You know the rules...`

    JobStatusResponse:
      type: object
      required: [id, type, status, progress]
      properties:
        id: { type: string }
        type: { type: string, enum: [prepare, compose, render, generate] }
        status: { type: string, enum: [queued, running, completed, failed, cancelled] }
        progress: { type: integer, minimum: 0, maximum: 100 }
        result:
          type: object
          nullable: true
          description: |
            Present when `status` is `completed`. Shape depends on job type.
            For compose/render: `output_url`, `s3_key`, `duration_seconds`,
            `width`, `height`, `file_size_bytes`.
            For prepare: `asset_id`, `outputs` array.
        error: { type: string, nullable: true, description: Present when `status` is `failed`. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error description.

  responses:
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized"
    NotFound:
      description: Resource not found or does not belong to the authenticated user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Not found"
