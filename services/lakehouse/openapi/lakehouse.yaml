openapi: 3.0.0
info:
  title: Lakehouse API
  description: |
    Asset storage and retrieval API for document management.
    Search PDFs by content, view files for vision analysis, process with PyMuPDF.

    Single unified route namespace: all endpoints are under /api/v1/assets/*.
    Auth accepts Bearer JWT (client UI) or Bearer MCP_ADMIN_KEY + X-User-Token (bridge/MCP).
  version: 2.0.0

servers:
  - url: http://localhost:3002
    description: Local development
  - url: https://api.apifunnel.ai
    description: Production

paths:
  /api/v1/assets:
    get:
      operationId: list_assets
      summary: List user's assets
      description: List assets with optional filtering by content type or tenant.
      parameters:
        - name: content_type
          in: query
          schema:
            type: string
          description: Filter by MIME type
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Filter by tenant
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Max results
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor (ISO timestamp of last item)
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      type: object
                      properties:
                        asset_id:
                          type: string
                          description: Unique asset identifier. Use to call /view, /text, /bytes, /download, /promote, DELETE.
                          example: "ast_qqToI6wd1Bim"
                        filename:
                          type: string
                          example: "report.pdf"
                        content_type:
                          type: string
                          description: |
                            MIME type. Use to decide which follow-up call to make:
                            application/pdf or application/dxf → /view for rendered pages.
                            text/* or application/json → /text for extracted content.
                            anything else → /bytes for raw bytes.
                          example: "application/pdf"
                        size_bytes:
                          type: integer
                          example: 204800
                        tenant_id:
                          type: string
                          nullable: true
                        page_count:
                          type: integer
                          nullable: true
                          description: Present for PDFs only.
                        thumbnail_url:
                          type: string
                          nullable: true
                          description: Pre-signed S3 URL for thumbnail preview (expires in 1 hour).
                        subagent_task_id:
                          type: string
                          nullable: true
                          description: Set when the asset was uploaded by a subagent run.
                        scheduled_task_id:
                          type: string
                          nullable: true
                          description: Set when the asset was uploaded by a scheduled task execution.
                        session_id:
                          type: string
                          nullable: true
                          description: Present if the asset is an ephemeral session artifact (not yet promoted).
                        created_at:
                          type: string
                          format: date-time
                  next_cursor:
                    type: string
                    nullable: true
                    description: Pass as cursor param to get the next page.
                  has_more:
                    type: boolean
        '401':
          description: Unauthorized

  /api/v1/assets/search:
    post:
      operationId: search_assets
      summary: Search assets by text content
      description: |
        Full-text search across user's documents.
        Returns matching assets with relevance scores and text snippets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Search terms (full-text search)
                  example: "liability clause"
                content_type:
                  type: string
                  description: Filter by MIME type
                  example: "application/pdf"
                tenant_id:
                  type: string
                  description: Filter by tenant
                limit:
                  type: integer
                  description: Max results
                  default: 20
                  minimum: 1
                  maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    asset_id:
                      type: string
                      description: Use to call /view, /text, /bytes, /download.
                      example: "ast_qqToI6wd1Bim"
                    filename:
                      type: string
                      example: "contract_draft.pdf"
                    content_type:
                      type: string
                      description: |
                        Use to decide which follow-up call to make:
                        application/pdf or application/dxf → /view.
                        text/* or application/json → /text.
                        anything else → /bytes.
                      example: "application/pdf"
                    size_bytes:
                      type: integer
                    page_count:
                      type: integer
                      nullable: true
                      description: Present for PDFs.
                    tenant_id:
                      type: string
                      nullable: true
                    snippet:
                      type: string
                      nullable: true
                      description: Up to 200 chars of matching extracted text.
                    score:
                      type: number
                      description: Full-text relevance score (higher is better).
                    created_at:
                      type: string
                      format: date-time
        '401':
          description: Unauthorized

  /api/v1/assets/ingest:
    post:
      operationId: ingest_asset
      summary: Upload a new asset (base64)
      description: |
        Upload a file as a JSON payload with base64-encoded content.
        The file is stored, content-typed, indexed for search, and returned with a unique asset_id.
        Subagent provenance (subagent_task_id, scheduled_task_id) is read from the caller's JWT
        and stored on the asset document automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
                - base64_content
              properties:
                filename:
                  type: string
                  description: Original filename with extension
                  example: "weekly_report.pdf"
                base64_content:
                  type: string
                  description: File content encoded as base64
                user_id:
                  type: string
                  description: Required for admin callers. Ignored for JWT callers.
                tenant_id:
                  type: string
                  description: Optional tenant scope
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                    description: Unique identifier. Use to call /view, /text, /bytes, /download, /promote, DELETE.
                    example: "ast_qqToI6wd1Bim"
                  filename:
                    type: string
                    example: "report.pdf"
                  content_type:
                    type: string
                    example: "application/pdf"
                  size_bytes:
                    type: integer
                    example: 204800
                  checksum_sha256:
                    type: string
                    description: SHA-256 hex digest of the file content.
                  s3_key:
                    type: string
                    description: Internal S3 object key.
                  thumbnail_url:
                    type: string
                    nullable: true
                    description: Pre-signed S3 URL for thumbnail (expires 1 hour). Present for PDFs and images.
                  snippet:
                    type: string
                    nullable: true
                    description: First ~200 chars of extracted text. Present for PDFs.
                  tenant_id:
                    type: string
                    nullable: true
                  page_count:
                    type: integer
                    nullable: true
                    description: Present for PDFs.
                  subagent_task_id:
                    type: string
                    nullable: true
                    description: Populated from the caller's JWT if present.
                  scheduled_task_id:
                    type: string
                    nullable: true
                    description: Populated from the caller's JWT if present.
                  status:
                    type: string
                    enum: [complete]
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Missing required fields or invalid base64
        '401':
          description: Unauthorized

  /api/v1/assets/{asset_id}:
    get:
      operationId: get_asset_metadata
      summary: Get asset metadata
      description: |
        Returns full metadata for an asset including page info for PDFs.
        By default, extracted_text and page_texts are omitted (can be large).
        Pass include_page_text=true to include them.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
        - name: include_page_text
          in: query
          schema:
            type: boolean
            default: false
          description: Include extracted_text and page_texts fields
      responses:
        '200':
          description: Asset metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                    example: "ast_qqToI6wd1Bim"
                  filename:
                    type: string
                    example: "report.pdf"
                  content_type:
                    type: string
                    description: |
                      MIME type. Use to decide which follow-up call to make:
                      application/pdf or application/dxf → /view.
                      text/* or application/json → /text.
                      anything else → /bytes.
                    example: "application/pdf"
                  size_bytes:
                    type: integer
                    example: 204800
                  checksum_sha256:
                    type: string
                  s3_key:
                    type: string
                  tenant_id:
                    type: string
                    nullable: true
                  thumbnail_url:
                    type: string
                    nullable: true
                    description: Pre-signed S3 URL (expires 1 hour). Present for PDFs and images.
                  document:
                    type: object
                    nullable: true
                    description: Present for PDFs.
                    properties:
                      page_count:
                        type: integer
                      pages:
                        type: array
                        items:
                          type: object
                          properties:
                            num:
                              type: integer
                            char_count:
                              type: integer
                  subagent_task_id:
                    type: string
                    nullable: true
                  scheduled_task_id:
                    type: string
                    nullable: true
                  session_id:
                    type: string
                    nullable: true
                    description: Present if asset is an ephemeral session artifact.
                  extracted_text:
                    type: string
                    nullable: true
                    description: Only present when include_page_text=true.
                  page_texts:
                    type: object
                    nullable: true
                    description: Page-keyed text map. Only present when include_page_text=true.
                  processing_status:
                    type: string
                    enum: [complete, processing, failed]
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                    nullable: true
        '404':
          description: Asset not found
    delete:
      operationId: delete_asset
      summary: Delete an asset
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/v1/assets/{asset_id}/view:
    get:
      operationId: get_asset_view
      summary: Get asset content for vision models
      description: |
        Returns base64-encoded content for vision analysis.
        For PDFs, returns individual pages as PNG images (up to max_pages).
        For DXF/DWG, renders the drawing to a PNG and returns it as a single page.
        For other formats, returns raw base64 bytes.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [pages, auto]
            default: auto
          description: Output format
        - name: max_pages
          in: query
          schema:
            type: integer
            default: 5
          description: Max pages to return for PDFs
      responses:
        '200':
          description: Asset content (base64)
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  content_type:
                    type: string
                  format:
                    type: string
                  total_pages:
                    type: integer
                    description: Total pages (DXF always 1)
                  page_count:
                    type: integer
                    description: Alias for total_pages (PDFs)
                  pages:
                    type: array
                    description: Rendered pages
                    items:
                      type: object
                      properties:
                        page_num:
                          type: integer
                        page:
                          type: integer
                          description: Alias for page_num (PDFs)
                        base64:
                          type: string
                        width:
                          type: integer
                        height:
                          type: integer
                  base64:
                    type: string
                    description: Raw bytes for non-renderable formats
        '404':
          description: Asset not found

  /api/v1/assets/{asset_id}/bytes:
    get:
      operationId: get_asset_bytes
      summary: Get raw asset bytes
      description: Get base64-encoded raw bytes for PyMuPDF/Pillow/ezdxf processing in code execution.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raw bytes (base64)
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                  base64:
                    type: string
        '404':
          description: Asset not found

  /api/v1/assets/{asset_id}/text:
    get:
      operationId: get_asset_text
      summary: Get full extracted text from an asset
      description: |
        Format-agnostic text extraction. Access the content via result['text'].
        PDFs: all pages concatenated.
        Text files (CSV, JSON, Markdown, plain text, HTML, XML, YAML, etc.): raw content.
        Binary/visual files (images, DXF/DWG): returns 400 — use get_asset_view instead.
        No truncation — full text is always returned.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full text content
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  text:
                    type: string
                  char_count:
                    type: integer
        '400':
          description: Text extraction not supported for this content type
        '404':
          description: Asset not found

  /api/v1/assets/{asset_id}/download:
    get:
      operationId: download_asset
      summary: Download raw file bytes
      description: Returns the original file as a binary response with correct Content-Type.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raw file bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not found

  /api/v1/assets/{asset_id}/promote:
    post:
      operationId: promote_asset
      summary: Promote ephemeral session artifact to permanent storage
      description: |
        Removes session metadata (session_id, is_ephemeral) from an asset document,
        making it permanently visible in the user's asset library.
        Called by the client UI "Save Permanently" action.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promoted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  asset_id:
                    type: string
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Asset not found or already permanent

  /health:
    get:
      operationId: health_check
      summary: Health check
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: lakehouse

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT for client UI calls.
        Or Bearer MCP_ADMIN_KEY with X-User-Token header for bridge/MCP calls.

security:
  - BearerAuth: []
