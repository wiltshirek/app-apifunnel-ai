openapi: 3.0.0
info:
  title: Lakehouse API
  description: |
    Asset storage and retrieval API for document management.
    Search PDFs by content, view files for vision analysis, process with PyMuPDF.

    This is an internal API that agents can discover and use like any external REST API.

    ## Lakehouse as a Compute Cache for Large API Responses

    The Lakehouse is not just document storage. It is a persistence layer for large
    structured blobs that are expensive to re-fetch from source APIs (Gmail, Slack,
    GitHub, Jira, etc.).

    ### The Core Pattern: Fetch → Blob → Ingest → Reuse

    1. **Fetch wide** — use the source API's native query language as a pre-filter.
       Pull raw results (emails, issues, messages, records) in batch using asyncio.gather()
       with a semaphore for concurrency.

    2. **Build a structured blob** — serialize all records into a single .txt or .json
       file using a consistent delimiter format:

       ```
       --- RECORD ---
       ID: {source_id}
       Source: {api_name}
       Date: {timestamp}
       Subject/Title: {label}
       Body:
       {content capped at 600 chars}
       ```

    3. **Ingest once** — POST /api/v1/assets/ingest (base64-encoded). The asset_id
       is your durable handle. Store it. The blob now survives container expiry.

    4. **Reuse across sessions** — any future execute_code() call retrieves the full
       blob via get_asset_text(asset_id) in a single API call, loading it directly
       into container memory. No re-fetching the source API.

    5. **Process in-container** — all search, filtering, ranking, and transformation
       runs as Python inside execute_code(). The container is the compute layer.
       The Lakehouse is the cache. The source API is just the data tap.

    ### Example: Searching 500 emails for a specific outcome

    ```python
    # Retrieve blob from lakehouse (one call, no Gmail re-fetch)
    from lakehouse_api import get_asset_text
    import re

    result = await get_asset_text(asset_id='ast_...')
    blob = result['text']

    # Split into per-record chunks on the delimiter
    records = re.split(r'(?=--- RECORD ---)', blob)
    records = [r.strip() for r in records if r.strip()]

    # Two-pass regex filter — wide net, then zoom
    wide = re.compile(r'oauth|scope|verif|approv|CASA|LOV', re.I)
    narrow = re.compile(r'approv|cleared|verified|LOV.*submit|success', re.I)

    hits = [r for r in records if wide.search(r)]
    strong = [r for r in hits if narrow.search(r)]

    for r in strong:
        print(r[:400])
    ```

    This pattern reduces source API calls from O(n per session) to O(1 lakehouse
    fetch per session) while keeping all processing logic in portable Python.

    ### Key insight for agents

    You are never "stuck" inside a single API's query language. Gmail's q= parameter,
    Jira's JQL, GitHub's search syntax — these are pre-filters only. The container
    is where real search, ranking, chunking, and transformation happens. Fetch wide,
    filter deep, in-memory. Use the Lakehouse to make that work durable.
  version: 1.0.0

servers:
  - url: http://localhost:3002
    description: Local development
  - url: https://api.apifunnel.ai
    description: Production

paths:
  /api/v1/assets:
    get:
      operationId: list_assets_external
      summary: List assets (external)
      description: List user's assets via JWT authentication
      parameters:
        - name: content_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
          description: Filter by tag value. When omitted, code_script assets are excluded by default.
        - name: query
          in: query
          schema:
            type: string
          description: Fuzzy filename search (case-insensitive contains match).
      responses:
        '200':
          description: Asset list
        '401':
          description: Unauthorized

  /api/v1/assets/search:
    get:
      operationId: search_assets_external
      summary: Search assets (external)
      description: Full-text search via JWT authentication
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: content_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
        '401':
          description: Unauthorized

  /api/v1/assets/upload:
    post:
      operationId: upload_asset_external
      summary: Upload asset (multipart)
      description: Upload a file via multipart form data with JWT authentication
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload successful
        '401':
          description: Unauthorized

  /api/v1/assets/session-artifact:
    post:
      operationId: persist_session_artifact
      summary: Upsert a code-execution session artifact
      description: |
        Upsert an asset produced inside a code-execution session. Keyed on
        `(user_id, session_id, artifact_path)` — repeated writes to the same
        path within the same session overwrite rather than accumulate.
        The S3 object is stored at `artifacts/{user_id}/{session_id}/{artifact_path}`.
        Retires the bridge's direct-Mongo `persist_session_artifacts` path.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - session_id
                - artifact_path
              properties:
                file:
                  type: string
                  format: binary
                session_id:
                  type: string
                artifact_path:
                  type: string
                  description: Relative path within the session workspace, e.g. "user_outputs/report.csv"
                artifact_type:
                  type: string
                  description: Optional, e.g. "output", "input"
                source:
                  type: string
                  description: Optional, e.g. "code_execution_output"
                is_ephemeral:
                  type: boolean
                  default: false
                container_id:
                  type: string
                tenant_id:
                  type: string
      responses:
        '200':
          description: Upsert result
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id: { type: string }
                  user_id: { type: string }
                  session_id: { type: string }
                  artifact_path: { type: string }
                  filename: { type: string }
                  content_type: { type: string }
                  size_bytes: { type: integer }
                  checksum_sha256: { type: string }
                  s3_key: { type: string }
                  is_ephemeral: { type: boolean }
                  created_at: { type: string, format: date-time }
                  updated_at: { type: string, format: date-time }
        '400':
          description: Missing user_id, session_id, or artifact_path
        '401':
          description: Unauthorized
        '500':
          description: S3 upload failed

  /api/v1/assets/code-script:
    post:
      operationId: create_code_script_asset
      summary: Store a code-execution script as an asset (with FIFO cap)
      description: |
        Store a Python/script body as an asset tagged `code_script` with
        `source: "code_execution_script"`. Enforces a rolling FIFO cap per user:
        after insertion, any `code_script` assets beyond the newest 5 are
        evicted (both Mongo doc and S3 object). Retires the bridge's direct-Mongo
        `create_code_asset` path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - filename
              properties:
                code:
                  type: string
                  description: The script source code
                filename:
                  type: string
                  description: Display filename for the script (e.g. "session.py")
      responses:
        '200':
          description: Script asset created
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id: { type: string }
                  filename: { type: string }
                  content_type: { type: string }
                  size_bytes: { type: integer }
                  checksum_sha256: { type: string }
                  s3_key: { type: string }
                  tags:
                    type: array
                    items: { type: string }
                  source: { type: string }
                  created_at: { type: string, format: date-time }
                  evicted_asset_ids:
                    type: array
                    items: { type: string }
                    description: asset_ids evicted by the FIFO cap on this write
        '400':
          description: Missing code or filename
        '401':
          description: Unauthorized

  /api/v1/assets/session/{session_id}:
    delete:
      operationId: delete_session_ephemerals
      summary: Bulk-delete ephemeral artifacts for a session
      description: |
        Delete every asset where `user_id` is the caller, `session_id` matches,
        and `is_ephemeral: true`. When `keep_outputs=true`, artifacts whose
        `artifact_path` begins with `user_outputs/` or `drafts/` are preserved
        (they represent user-visible deliverables, not transient session state).
        Retires the bridge's direct-Mongo `delete_ephemeral_artifacts_only` path.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: keep_outputs
          in: query
          schema:
            type: boolean
            default: false
          description: Preserve artifact_paths under user_outputs/ or drafts/
      responses:
        '200':
          description: Bulk-delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count: { type: integer }
                  deleted_asset_ids:
                    type: array
                    items: { type: string }
                  keep_outputs: { type: boolean }
        '400':
          description: Missing user_id or session_id
        '401':
          description: Unauthorized

  /api/v1/assets/{asset_id}:
    get:
      operationId: get_asset_external
      summary: Get asset metadata (external)
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset metadata
        '404':
          description: Not found
    delete:
      operationId: delete_asset_external
      summary: Delete asset (external)
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/v1/assets/{asset_id}/download:
    get:
      operationId: download_asset_external
      summary: Download raw file bytes
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raw file bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not found

  /api/v1/assets/{asset_id}/bytes:
    get:
      operationId: get_asset_bytes_external
      summary: Get raw asset bytes (base64)
      description: Returns base64-encoded raw file bytes as JSON. Useful for PyMuPDF/Pillow processing in code containers.
      security:
        - BearerAuth: []
        - BearerAuth: []
          AdminKey: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
      responses:
        '200':
          description: Raw bytes (base64-encoded)
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                  base64:
                    type: string
                    description: Base64-encoded raw file bytes
        '401':
          description: Unauthorized
        '404':
          description: Asset not found

  /api/v1/assets/{asset_id}/text:
    get:
      operationId: get_asset_text_external
      summary: Get extracted text content
      description: |
        Format-agnostic text extraction. Returns a JSON object — access the content via result['text'].
        PDFs: text field contains all extracted text concatenated across all pages.
        Text files (CSV, JSON, Markdown, plain text, HTML, XML, YAML, etc.): text field contains raw content.
        Binary/visual files (images, DXF/DWG): returns 400 directing to get_asset_view.
        No truncation — the full text is always returned.
      security:
        - BearerAuth: []
        - BearerAuth: []
          AdminKey: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
      responses:
        '200':
          description: Full text content of the asset
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  text:
                    type: string
                    description: Full text content of the asset
                  char_count:
                    type: integer
                    description: Character count of the returned text
        '400':
          description: Text extraction not supported for this content type
        '401':
          description: Unauthorized
        '404':
          description: Asset not found

  /api/v1/assets/{asset_id}/view:
    get:
      operationId: get_asset_view_external
      summary: Get asset content for vision models
      description: |
        Returns rendered page images for visual content (PDFs, CAD files, images).
        For PDFs, returns individual pages as base64-encoded PNG images.
        For DXF/DWG CAD files, renders to PNG.
        For other file types, returns the raw bytes as base64.
      security:
        - BearerAuth: []
        - BearerAuth: []
          AdminKey: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
        - name: format
          in: query
          schema:
            type: string
            enum: [pdf, pages, auto]
            default: auto
          description: Output format (auto selects best format for the content type)
        - name: max_pages
          in: query
          schema:
            type: integer
            default: 5
          description: Maximum number of pages to return for multi-page documents
      responses:
        '200':
          description: Asset content for vision analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  format:
                    type: string
                  total_pages:
                    type: integer
                  page_count:
                    type: integer
                  pages:
                    type: array
                    description: Rendered page images (for PDFs and CAD files)
                    items:
                      type: object
                      properties:
                        page:
                          type: integer
                        page_num:
                          type: integer
                        base64:
                          type: string
                        width:
                          type: integer
                        height:
                          type: integer
                  base64:
                    type: string
                    description: Base64-encoded raw bytes (fallback for non-renderable types)
                  size_bytes:
                    type: integer
                    description: Size in bytes (present when returning raw base64 fallback)
        '401':
          description: Unauthorized
        '404':
          description: Asset not found

  /health:
    get:
      operationId: health_check
      summary: Health check
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: lakehouse

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        User JWT. Required on every authenticated route.
        Carries `sub` (user_id), `email`, and other identity claims.
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: |
        Service-to-service admin key (`MCP_ADMIN_KEY`). Optional.
        When present alongside `BearerAuth`, grants admin-level trust on
        top of the user JWT identity.

security:
  - BearerAuth: []
  - BearerAuth: []
    AdminKey: []
