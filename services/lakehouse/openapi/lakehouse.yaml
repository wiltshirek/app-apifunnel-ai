openapi: 3.0.0
info:
  title: Lakehouse API
  description: |
    Asset storage and retrieval API for document management.
    Search PDFs by content, view files for vision analysis, process with PyMuPDF.

    This is an internal API that agents can discover and use like any external REST API.

    ## Lakehouse as a Compute Cache for Large API Responses

    The Lakehouse is not just document storage. It is a persistence layer for large
    structured blobs that are expensive to re-fetch from source APIs (Gmail, Slack,
    GitHub, Jira, etc.).

    ### The Core Pattern: Fetch → Blob → Ingest → Reuse

    1. **Fetch wide** — use the source API's native query language as a pre-filter.
       Pull raw results (emails, issues, messages, records) in batch using asyncio.gather()
       with a semaphore for concurrency.

    2. **Build a structured blob** — serialize all records into a single .txt or .json
       file using a consistent delimiter format:

       ```
       --- RECORD ---
       ID: {source_id}
       Source: {api_name}
       Date: {timestamp}
       Subject/Title: {label}
       Body:
       {content capped at 600 chars}
       ```

    3. **Ingest once** — POST /api/v1/assets/ingest (base64-encoded). The asset_id
       is your durable handle. Store it. The blob now survives container expiry.

    4. **Reuse across sessions** — any future execute_code() call retrieves the full
       blob via get_asset_text(asset_id) in a single API call, loading it directly
       into container memory. No re-fetching the source API.

    5. **Process in-container** — all search, filtering, ranking, and transformation
       runs as Python inside execute_code(). The container is the compute layer.
       The Lakehouse is the cache. The source API is just the data tap.

    ### Example: Searching 500 emails for a specific outcome

    ```python
    # Retrieve blob from lakehouse (one call, no Gmail re-fetch)
    from lakehouse_api import get_asset_text
    import re

    result = await get_asset_text(asset_id='ast_...')
    blob = result['text']

    # Split into per-record chunks on the delimiter
    records = re.split(r'(?=--- RECORD ---)', blob)
    records = [r.strip() for r in records if r.strip()]

    # Two-pass regex filter — wide net, then zoom
    wide = re.compile(r'oauth|scope|verif|approv|CASA|LOV', re.I)
    narrow = re.compile(r'approv|cleared|verified|LOV.*submit|success', re.I)

    hits = [r for r in records if wide.search(r)]
    strong = [r for r in hits if narrow.search(r)]

    for r in strong:
        print(r[:400])
    ```

    This pattern reduces source API calls from O(n per session) to O(1 lakehouse
    fetch per session) while keeping all processing logic in portable Python.

    ### Key insight for agents

    You are never "stuck" inside a single API's query language. Gmail's q= parameter,
    Jira's JQL, GitHub's search syntax — these are pre-filters only. The container
    is where real search, ranking, chunking, and transformation happens. Fetch wide,
    filter deep, in-memory. Use the Lakehouse to make that work durable.
  version: 1.0.0

servers:
  - url: http://localhost:3002
    description: Local development
  - url: https://api.apifunnel.ai
    description: Production

paths:
  /internal/assets/search:
    post:
      operationId: search_assets
      summary: Search assets by text content
      description: |
        Full-text search across user's documents.
        Returns matching assets with relevance scores and text snippets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Search terms (full-text search)
                  example: "liability clause"
                content_type:
                  type: string
                  description: Filter by MIME type
                  example: "application/pdf"
                tenant_id:
                  type: string
                  description: Filter by tenant
                limit:
                  type: integer
                  description: Max results
                  default: 20
                  minimum: 1
                  maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    asset_id:
                      type: string
                    filename:
                      type: string
                    content_type:
                      type: string
                    page_count:
                      type: integer
                    snippet:
                      type: string
                    score:
                      type: number
        '401':
          description: Unauthorized

  /internal/assets/{asset_id}:
    get:
      operationId: get_asset_metadata
      summary: Get asset metadata
      description: Get full metadata for an asset including page info for PDFs
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
        - name: include_page_text
          in: query
          schema:
            type: boolean
            default: false
          description: Include extracted text per page (can be large)
      responses:
        '200':
          description: Asset metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                  page_count:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
        '404':
          description: Asset not found

  /internal/assets/{asset_id}/view:
    get:
      operationId: get_asset_view
      summary: Get asset content for vision models
      description: |
        Returns base64-encoded content for vision analysis.
        For PDFs, can return full PDF or individual pages as images.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [pdf, pages, auto]
            default: auto
          description: Output format
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: Specific page number for 'pages' format
        - name: max_pages
          in: query
          schema:
            type: integer
            default: 5
          description: Max pages for 'auto' format
      responses:
        '200':
          description: Asset content (base64)
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  format:
                    type: string
                  base64:
                    type: string
                  page_count:
                    type: integer
                  pages:
                    type: array
                    description: For 'pages' format
                    items:
                      type: object
                      properties:
                        page_num:
                          type: integer
                        base64:
                          type: string
                        width:
                          type: integer
                        height:
                          type: integer

  /internal/assets/{asset_id}/bytes:
    get:
      operationId: get_asset_bytes
      summary: Get raw asset bytes
      description: Get base64-encoded raw bytes for PyMuPDF/Pillow processing
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raw bytes (base64)
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                  base64:
                    type: string

  /internal/assets:
    post:
      operationId: upload_asset
      summary: Upload a new asset
      description: |
        Upload a file to the lakehouse as a base64-encoded payload.
        The file is stored, indexed for search, and returned with a unique asset_id.

        Primary use case: persist a structured blob of API results (emails, issues,
        messages, records) so it survives container expiry and can be retrieved in
        future sessions via get_asset_text() without re-fetching the source API.
        This is the Ingest step in the Fetch → Blob → Ingest → Reuse pattern.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
                - base64_content
              properties:
                filename:
                  type: string
                  description: Original filename (e.g., "report.pdf")
                  example: "weekly_report.pdf"
                base64_content:
                  type: string
                  description: File content encoded as base64 string
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                  status:
                    type: string
                    example: "complete"
        '400':
          description: Missing required fields or invalid base64
        '401':
          description: Unauthorized
    get:
      operationId: list_assets
      summary: List user's assets
      description: List assets with optional filtering by type or tenant
      parameters:
        - name: content_type
          in: query
          schema:
            type: string
          description: Filter by MIME type
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Filter by tenant
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Max results
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                  next_cursor:
                    type: string
                  has_more:
                    type: boolean

  /internal/assets/{asset_id}/text:
    get:
      operationId: get_asset_text
      summary: Get full text content from an asset
      description: |
        Format-agnostic text extraction. Returns a JSON object — access the content via result['text'].
        PDFs: text field contains all extracted text concatenated across all pages.
        Text files (CSV, JSON, Markdown, plain text, HTML, XML, YAML, etc.): text field contains raw content.
        Binary/visual files (images, DXF/DWG): returns an error directing to get_asset_view.
        No truncation — the full text is always returned.

        Primary use case: retrieve a previously ingested blob of structured records
        (emails, issues, messages, etc.) directly into container memory for in-process
        filtering, regex search, or transformation — without re-fetching the source API.
        Pair with execute_code() for all compute. This is the Lakehouse cache retrieval
        step in the Fetch → Blob → Ingest → Reuse pattern described in the API description.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
      responses:
        '200':
          description: Full text content of the asset
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  text:
                    type: string
                    description: Full text content of the asset
                  char_count:
                    type: integer
                    description: Character count of the returned text
        '400':
          description: Text extraction not supported for this content type
        '404':
          description: Asset not found

  /api/v1/assets:
    get:
      operationId: list_assets_external
      summary: List assets (external)
      description: List user's assets via JWT authentication
      parameters:
        - name: content_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Asset list
        '401':
          description: Unauthorized

  /api/v1/assets/search:
    get:
      operationId: search_assets_external
      summary: Search assets (external)
      description: Full-text search via JWT authentication
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: content_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
        '401':
          description: Unauthorized

  /api/v1/assets/upload:
    post:
      operationId: upload_asset_external
      summary: Upload asset (multipart)
      description: Upload a file via multipart form data with JWT authentication
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload successful
        '401':
          description: Unauthorized

  /api/v1/assets/{asset_id}:
    get:
      operationId: get_asset_external
      summary: Get asset metadata (external)
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset metadata
        '404':
          description: Not found
    delete:
      operationId: delete_asset_external
      summary: Delete asset (external)
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found

  /api/v1/assets/{asset_id}/download:
    get:
      operationId: download_asset_external
      summary: Download raw file bytes
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raw file bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not found

  /api/v1/assets/{asset_id}/bytes:
    get:
      operationId: get_asset_bytes_external
      summary: Get raw asset bytes (base64)
      description: Returns base64-encoded raw file bytes as JSON. Useful for PyMuPDF/Pillow processing in code containers.
      security:
        - BearerAuth: []
        - AdminKey: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
      responses:
        '200':
          description: Raw bytes (base64-encoded)
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                  base64:
                    type: string
                    description: Base64-encoded raw file bytes
        '401':
          description: Unauthorized
        '404':
          description: Asset not found

  /api/v1/assets/{asset_id}/text:
    get:
      operationId: get_asset_text_external
      summary: Get extracted text content
      description: |
        Format-agnostic text extraction. Returns a JSON object — access the content via result['text'].
        PDFs: text field contains all extracted text concatenated across all pages.
        Text files (CSV, JSON, Markdown, plain text, HTML, XML, YAML, etc.): text field contains raw content.
        Binary/visual files (images, DXF/DWG): returns 400 directing to get_asset_view.
        No truncation — the full text is always returned.
      security:
        - BearerAuth: []
        - AdminKey: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
      responses:
        '200':
          description: Full text content of the asset
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  text:
                    type: string
                    description: Full text content of the asset
                  char_count:
                    type: integer
                    description: Character count of the returned text
        '400':
          description: Text extraction not supported for this content type
        '401':
          description: Unauthorized
        '404':
          description: Asset not found

  /api/v1/assets/{asset_id}/view:
    get:
      operationId: get_asset_view_external
      summary: Get asset content for vision models
      description: |
        Returns rendered page images for visual content (PDFs, CAD files, images).
        For PDFs, returns individual pages as base64-encoded PNG images.
        For DXF/DWG CAD files, renders to PNG.
        For other file types, returns the raw bytes as base64.
      security:
        - BearerAuth: []
        - AdminKey: []
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
          description: Asset ID
        - name: format
          in: query
          schema:
            type: string
            enum: [pdf, pages, auto]
            default: auto
          description: Output format (auto selects best format for the content type)
        - name: max_pages
          in: query
          schema:
            type: integer
            default: 5
          description: Maximum number of pages to return for multi-page documents
      responses:
        '200':
          description: Asset content for vision analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset_id:
                    type: string
                  filename:
                    type: string
                  content_type:
                    type: string
                  format:
                    type: string
                  total_pages:
                    type: integer
                  page_count:
                    type: integer
                  pages:
                    type: array
                    description: Rendered page images (for PDFs and CAD files)
                    items:
                      type: object
                      properties:
                        page:
                          type: integer
                        page_num:
                          type: integer
                        base64:
                          type: string
                        width:
                          type: integer
                        height:
                          type: integer
                  base64:
                    type: string
                    description: Base64-encoded raw bytes (fallback for non-renderable types)
                  size_bytes:
                    type: integer
                    description: Size in bytes (present when returning raw base64 fallback)
        '401':
          description: Unauthorized
        '404':
          description: Asset not found

  /health:
    get:
      operationId: health_check
      summary: Health check
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: lakehouse

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for external routes
    AdminKey:
      type: http
      scheme: bearer
      description: MCP_ADMIN_KEY for internal routes (with X-User-Token header for identity)

security:
  - BearerAuth: []
